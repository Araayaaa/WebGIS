<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Poverty-Mapping GIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #666;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-submit {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .form-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .form-submit:active {
            transform: translateY(0);
        }
        .form-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            padding: 12px;
            background: #fee;
            border: 1px solid #fcc;
            border-radius: 8px;
            color: #c33;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .test-credentials {
            background: #f0f4ff;
            border: 1px solid #d4e0ff;
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            color: #4a5f9e;
        }
        .test-credentials strong { color: #3d4a7a; }
        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: dots 1.4s infinite;
        }
        @keyframes dots {
            0%, 20%, 50%, 80%, 100% { opacity: 1; }
            40% { opacity: 0.5; }
            60% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <div class="login-icon">🗺</div>
        <div class="login-title">Poverty-Mapping GIS</div>
        <div class="login-subtitle">Distribusi Bantuan Sosial</div>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" id="username" required autocomplete="username" placeholder="Masukkan username"/>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" required autocomplete="current-password" placeholder="Masukkan password"/>
        </div>
        <button type="submit" class="form-submit" id="submitBtn">
            🔓 Login
        </button>
    </form>

    <div class="test-credentials">
        <strong>Test Credentials:</strong><br>
        <strong>Admin:</strong> admin / Admin@123<br>
        <strong>Surveyor:</strong> surveyor / Survey@123<br>
        <strong>Viewer:</strong> viewer / View@123
    </div>
</div>

<script>
async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    submitBtn.disabled = true;
    submitBtn.textContent = '🔄 Login' + String.fromCharCode(8230);
    errorMsg.style.display = 'none';

    try {
        const response = await fetch('login_api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        });

        const data = await response.json();

        if (data.success) {
            window.location.href = 'index.html';
        } else {
            errorMsg.textContent = data.error || 'Login gagal';
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = '🔓 Login';
        }
    } catch (err) {
        errorMsg.textContent = 'Terjadi kesalahan: ' + err.message;
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '🔓 Login';
    }
}
</script>

</body>
</html>
